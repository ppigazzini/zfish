# CI for the Zig-owned Stockfish port: build the (pure-Zig, zero-C++) binary and run
# `zig build parity` -- the bench signature, the src-free structural gate, and the
# in-repo golden / per-position / non-bench micro-parity harnesses. No C++ is vendored
# or compiled; the differential-vs-upstream check is the worktree oracle (upstream-parity),
# exercised at sync time. Linux x86_64 (parity job) + aarch64 on a native arm64 runner
# (arm-native job).
name: zfish parity

on:
  push:
    branches: [main, github_ci]
  workflow_dispatch:

# One in-flight run per branch; a newer push cancels the older run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: the gate only needs to read the repository.
permissions:
  contents: read

jobs:
  # Formatting gate: the canonical `zig fmt` must be clean on every
  # owned Zig surface. Cheap, fast, and blocks the rest of the matrix on drift.
  fmt:
    name: zig fmt --check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0
      # Owned Zig only (src/, tools/, build.zig); tests/ and scripts/ are
      # imported upstream mirrors and are not zfish-formatted.
      - run: zig fmt --check src/ tools/ build.zig

  parity:
    name: Linux x86-64 parity
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Installs Zig 0.16.0 and caches the global + local Zig build cache
      # (use-cache defaults to true), so reruns skip recompilation.
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0

      # Cache the downloaded NNUE network (~50 MB) keyed on the net name the Zig
      # binary actually loads -- the `default_eval_file_name` constant in
      # src/engine/eval/network.zig -- so a Zig-only net bump busts the cache. The
      # net is fetched into and read from net/ (the runtime cwd; src/ is gone).
      - name: Cache NNUE network
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: net/nn-*.nnue
          key: nnue-${{ hashFiles('src/engine/eval/network.zig') }}

      # Pin the ARCH instead of `native`: GitHub runners have modern CPUs whose
      # `native` resolves to a PEXT/AVX512 arch. Pin the exact baseline the bench
      # signature / parity goldens were validated against so the gate is
      # reproducible and CPU-independent (sse41 runs on any runner).
      - run: zig build parity -Darch=x86-64-sse41-popcnt

      # Unit + property tests: the module `test {}` blocks plus the
      # board property suite (perft to reference counts, make/unmake & null-move
      # round-trips, FEN round-trip/flip, movegen<->legality, SEE, givesCheck,
      # repetition/50-move draw, malformed-FEN rejection, and a 50k-iter parse fuzz).
      # These assert real invariants.
      - run: zig build test -Darch=x86-64-sse41-popcnt

      # Safety-checked (UBSan-equivalent) test run: the same unit + property suite
      # rebuilt under -Doptimize=ReleaseSafe, so Zig's runtime safety checks --
      # bounds, integer overflow, pointer alignment, null-unwrap, illegal cast --
      # are ON across the board path the tests drive (incl. the 80k-iteration parser
      # fuzz).
      - run: zig build test -Darch=x86-64-sse41-popcnt -Doptimize=ReleaseSafe

      # Coverage-guided fuzz-target SMOKE: `zig build fuzz` runs each
      # std.testing.fuzz target once (FEN-parse -> movegen -> make/unmake via the
      # Smith model) under ReleaseSafe, so the fuzz harness itself is build- and
      # run-gated on every push even though the continuous `--fuzz` sweep is a
      # separate nightly job (zfish_fuzz.yml). Built under ReleaseSafe so a target
      # that trips a bounds/overflow/alignment/null check fails here. Cheap and
      # deterministic.
      - run: zig build fuzz -Darch=x86-64-sse41-popcnt -Doptimize=ReleaseSafe

      # Safety-checked full engine: the ENTIRE parity suite rebuilt under
      # -Doptimize=ReleaseSafe. Supersets the safety-checked bench (signature 2067208)
      # and additionally drives the multi-thread (mt-sanity), Lazy-SMP go/stop stress,
      # transposition-table, NNUE-eval, time-management, and every UCI-output golden
      # path with Zig's runtime safety checks ON -- the paths the property tests and a
      # bare bench do not reach. This gate keeps any future bounds / overflow /
      # alignment / null-unwrap regression out of CI.
      - run: zig build parity -Darch=x86-64-sse41-popcnt -Doptimize=ReleaseSafe

      # Arch-variant determinism: the
      # pure-Zig port must yield the SAME bench on every arch -- a SIMD width or
      # codegen change must not perturb the integer-exact eval. This sweep asserts
      # signature == 2067208 on every tier THIS runner can execute (avx2, bmi2/PEXT,
      # and its best AVX-512 tier), not just avx2 -- the wider tiers are where the
      # @Vector NNUE kernels could break bit-exactness while
      # sse41/avx2 stay green. Runs the real bench per tier, so it is not hollow.
      - run: bash tools/arch_determinism.sh 2067208

      # (Wall-clock time management, multi-thread sanity, and the go/stop stress gate run
      # INSIDE `zig build parity` above, so they also run on the Windows/macOS lanes.)

  # Cross-ISA gate. The pure-Zig @Vector NNUE lowers to NEON on aarch64 (LLVM)
  # with no source changes -- where upstream needs hand-written NEON intrinsics per
  # its own src/nnue/**. The integer-exact eval is arch-invariant, so the ARM bench must be
  # exactly 2067208; x86 CI cannot see an ARM-only codegen or C-ABI regression. We run
  # on a NATIVE GitHub arm64 runner (free for public repos) instead of qemu-user: it
  # exercises real NEON hardware and native codegen, is far faster than emulation, and
  # needs no cross-libc.
  arm-native:
    name: Linux aarch64 parity
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0

      - name: Cache NNUE network
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: net/nn-*.nnue
          key: nnue-${{ hashFiles('src/engine/eval/network.zig') }}

      - name: Fetch the NNUE net
        run: zig build net

      - name: Build aarch64 (armv8-dotprod) + bench (native)
        run: |
          zig build -Darch=armv8-dotprod
          cd net
          out="$(../zig-out/bin/stockfish bench 2>&1)"
          printf '%s\n' "$out" | tail -6
          printf '%s\n' "$out" | grep -qE 'Nodes searched[[:space:]]*:[[:space:]]*2067208([^0-9]|$)' \
            || { echo 'arm-native: FAIL -- aarch64 bench != 2067208'; exit 1; }
          echo 'arm-native: OK -- aarch64 bench == 2067208 on a native arm64 runner'

  # Cross-OS gate. The same pure-Zig source builds for the other two owned runtime
  # OSes -- Windows and macOS -- across their x86_64 and aarch64 tiers, behind the platform
  # seam (sync/alloc/clock/argv/stdio). Each lane builds NATIVELY on a GitHub-hosted runner
  # (free for public repos) and runs `zig build parity-portable`: the bench signature plus all
  # six golden gates (output / search-parity / search-modes / perft / eval / misc), driven by
  # the pure-Zig parity harness -- the same coverage the Linux lanes get. The integer-exact NNUE
  # eval is arch/OS-invariant, so
  # any per-OS regression (a mis-marshaled sync primitive, a bad aligned allocation, an
  # argv/stdio mistake) that perturbs the search shows up here. Only the Linux-specific
  # structural gates (src-free via `nm`, arch-determinism) stay exclusive to `parity`.
  # July-2026 standard runner labels: windows-2025 (x64), windows-11-arm (arm64),
  # macos-26 (Apple silicon arm64), macos-26-intel (x64). fail-fast off so one OS failing
  # still reports the others.
  native-os:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x86-64 parity
            runner: windows-2025
            os: windows
            arch: x86-64-sse41-popcnt
          - name: Windows aarch64 parity
            runner: windows-11-arm
            os: windows
            arch: armv8-dotprod
            # The native aarch64-windows Zig 0.16.0 segfaults on startup on this runner
            # (a toolchain bug -- the engine itself cross-compiles to a valid aarch64
            # PE). Run the x86_64 Zig under Windows-on-ARM x64 emulation instead and
            # cross-compile to aarch64-windows; the produced binaries still run natively,
            # so the harness validates the signature on real arm64 hardware.
            zig_x64_emu: true
          - name: macOS aarch64 parity
            runner: macos-26
            os: macos
            arch: apple-silicon
          - name: macOS x86-64 parity
            runner: macos-26-intel
            os: macos
            arch: x86-64-sse41-popcnt
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Standard path: setup-zig installs the host-native Zig 0.16.0 (+cache).
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        if: ${{ !matrix.zig_x64_emu }}
        with:
          version: 0.16.0

      # windows-11-arm only: the native arm64 Zig crashes, so fetch the x86_64 build and
      # run it under x64 emulation (7-Zip + curl are preinstalled on the runner). Zig
      # cross-compiles to any target regardless of host arch, so this still produces the
      # native aarch64-windows binary.
      - name: Install x86_64 Zig (emulated)
        if: ${{ matrix.zig_x64_emu }}
        shell: bash
        run: |
          curl -fsSL https://ziglang.org/download/0.16.0/zig-x86_64-windows-0.16.0.zip -o zig.zip
          7z x zig.zip -o"$HOME/zigdl" >/dev/null
          echo "$HOME/zigdl/zig-x86_64-windows-0.16.0" >> "$GITHUB_PATH"

      - name: Cache NNUE network
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: net/nn-*.nnue
          key: nnue-${{ hashFiles('src/engine/eval/network.zig') }}

      # Pre-fetch the net so it is cached before the build. `zig build net` runs the pure-Zig
      # fetcher (tools/fetch_net.zig) -- no bash/curl/wget -- and early-exits when present.
      # `shell: bash` is required on the windows-11-arm emulated lane: the x86_64 Zig above is
      # put on PATH via a bash step ($GITHUB_PATH with a bash-style path), so a step must run
      # under bash to resolve `zig`; the default Windows shell is PowerShell and can't. Harmless
      # on the other lanes (git-bash on Windows-x64, bash on macOS).
      - name: Fetch the NNUE net
        shell: bash
        run: zig build net

      # Full cross-OS parity: bench signature (2067208) + the six golden gates, all via the
      # pure-Zig harness. `shell: bash` for the same emulated-lane PATH reason as the fetch step.
      - name: Build + parity-portable (native, ${{ matrix.arch }})
        shell: bash
        run: zig build parity-portable -Dos=${{ matrix.os }} -Darch=${{ matrix.arch }}

  # Memory-safety gate. Valgrind memcheck over the two allocation-lifecycle paths a
  # bench never exercises: the searchmoves/rootMoves list churn + Worker construct/
  # destroy (parity-teardown) and multi-thread go sessions (parity-valgrind). Both
  # assert no definite leak / invalid access / bad free, reading valgrind's own summary. Catches
  # a leak/bad-free regression on every push. Pinned to -Darch=x86-64: the
  # default AVX-512 build SIGILLs under valgrind 3.x (documented workaround), and the baseline
  # tier runs on any runner. Out of the fast `parity` job (memcheck is ~20-50x slower).
  valgrind:
    name: Linux valgrind memcheck
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0
      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind
      - name: Cache NNUE network
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: net/nn-*.nnue
          key: nnue-${{ hashFiles('src/engine/eval/network.zig') }}
      - name: Fetch the NNUE net
        run: zig build net
      # searchmoves/rootMoves list lifecycle + Worker clear churn (Threads=1).
      - name: Leak gate -- searchmoves/rootMoves + Worker clear
        run: zig build parity-teardown -Darch=x86-64
      # multi-thread memcheck across Threads {1,2}.
      - name: Memcheck -- multi-thread search
        run: zig build parity-valgrind -Darch=x86-64

  # NOTE: the kcov line-coverage and Zig-nightly lanes were removed. Both went red for
  # reasons that can't be reproduced/verified in the dev environment, and neither is a correctness
  # gate: kcov is no longer packaged for Ubuntu 24.04 and, built from source, its ptrace-based
  # instrumentation fails on the runner sandbox; the nightly lane is red BY DESIGN whenever Zig
  # master drifts (e.g. 0.17 removed b.pathFromRoot). Coverage stays available locally via the
  # `-Dtest-coverage` build option (`zig build test -Dtest-coverage`, needs kcov on PATH). Only
  # gates that are verified green are kept here.
