# CI for the C++ -> Zig conversion: build the Zig-owned binary and the legacy
# C++ oracle, then run `zig build parity` (bench signature, the default-vs-legacy
# oracle gate, and the per-position / non-bench micro-parity harnesses).
# Linux x86_64 only.
name: zfish parity

on:
  push:
    branches: [main, github_ci]
  workflow_dispatch:

# One in-flight run per branch; a newer push cancels the older run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: the gate only needs to read the repository.
permissions:
  contents: read

jobs:
  parity:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Installs Zig 0.16.0 and caches the global + local Zig build cache
      # (use-cache defaults to true), so reruns skip recompilation.
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0

      # Cache the downloaded NNUE network (~50 MB) keyed on the net name the Zig
      # binary actually loads -- the `default_eval_file_name` constant in
      # zig_build/eval/network.zig -- so a Zig-only net bump busts the cache. The
      # stale src/evaluate.h names the old net and the binary never reads it.
      - name: Cache NNUE network
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: src/nn-*.nnue
          key: nnue-${{ hashFiles('zig_build/eval/network.zig') }}

      # Pin the ARCH instead of `native`: GitHub runners have modern CPUs whose
      # `native` resolves to a PEXT/AVX512 arch, but the C++ oracle bridge still
      # mirrors the fancy-magic (non-PEXT) `struct Magic` layout. Pin the exact
      # baseline the bench signature / parity goldens were validated against so
      # the gate is reproducible and CPU-independent (sse41 runs on any runner).
      - run: zig build parity -Darch=x86-64-sse41-popcnt

      # Arch-variant determinism (REPORT-14 M14.D, widened in REPORT-15 M15.1): the
      # pure-Zig port must yield the SAME bench on every arch -- a SIMD width or
      # codegen change must not perturb the integer-exact eval. This sweep asserts
      # signature == 2067208 on every tier THIS runner can execute (avx2, bmi2/PEXT,
      # and its best AVX-512 tier), not just avx2 -- the wider tiers are where the
      # upcoming @Vector NNUE kernels (M15.2+) could break bit-exactness while
      # sse41/avx2 stay green. Runs the real bench per tier, so it is not hollow.
      - run: bash zig_build/tools/arch_determinism.sh 2067208

      # Wall-clock time management (REPORT-15 §9): the deterministic `parity`
      # aggregate above is entirely depth/node-limited and never consults the
      # clock, so a time-management regression (e.g. the startTime=0 bug that made
      # `go movetime` return instantly) is invisible to it. This invariant gate
      # drives `go movetime`/`go wtime` and asserts the reported elapsed tracks and
      # scales with the budget. Non-deterministic, so it is its own step outside the
      # aggregate; sse41 keeps it CPU-independent.
      - run: zig build parity-time -Darch=x86-64-sse41-popcnt
