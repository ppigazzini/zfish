# Scheduled upstream-sync detection and map health.
#
# Two halves. DETECTION is judgment-free: fetch official-stockfish/master and
# print how many commits the port is behind its UPSTREAM_BASE marker, so a
# net-format / bench change can't silently bundle up between sessions. Porting
# stays a deliberate, human-gated session -- that half only detects, it never
# attempts a port. The GATING half runs `zig build upstream-map` -- the
# declared-vs-derived map audit (rot fails) plus the uncovered-surface ratchet
# -- which the parity workflow cannot run because a plain checkout of origin
# does not carry the pinned upstream tree; here the detection half's fetch of
# the upstream remote has already brought those objects in.
name: zfish upstream check

on:
  schedule:
    # Weekly, Monday 06:00 UTC. Upstream master moves a few commits a week; the
    # rule is "sync at least at every net bump", and weekly detection is
    # cheap insurance against one slipping through.
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

# Least privilege: detection only reads the repository and upstream history.
permissions:
  contents: read

jobs:
  upstream-check:
    name: Detect upstream drift
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Full history so `git rev-list BASE..upstream/master` can count the gap
      # (a shallow checkout may not contain UPSTREAM_BASE).
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      # The sync driver fetches from a remote named `upstream`; add it here (the
      # local dev clone adds it separately, CI adds its own).
      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/official-stockfish/Stockfish.git

      # upstream_sync.sh --check fetches upstream/master, computes the behind-
      # count from UPSTREAM_BASE, and prints one terse line. Always exits 0 --
      # this is informational, not a gate. Surface the line in the job summary.
      - name: Detect upstream drift
        run: |
          line="$(bash tools/upstream_sync.sh --check)"
          echo "$line"
          {
            echo "## Upstream drift"
            echo ""
            echo "\`$line\`"
            echo ""
            echo "Porting is human-gated: run \`tools/upstream_sync.sh\` locally for the worklist."
          } >> "$GITHUB_STEP_SUMMARY"

      # pyproject.toml declares requires-python >= 3.14; run the tools on what
      # they declare, not on whatever python3 the runner image ships.
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"

      # The map gate proper. The drift step's fetch pulled the upstream remote's
      # objects into this clone, so the pinned tree at UPSTREAM_TARGET is now
      # readable and the audit runs exactly as it does locally: declared-map rot
      # fails, drift is advisory, and the uncovered count is ratcheted against
      # tools/upstream/upstream_map.baseline. This one IS a gate -- a red run
      # means the blast-radius map no longer matches the tree.
      - name: Audit the upstream map (rot + ratchet)
        run: |
          # Capture without tripping `bash -e` on a red audit: the summary must
          # publish exactly when the gate fails.
          if out="$(python3 tools/upstream_map_derive.py --audit)"; then
            status=0
          else
            status=$?
          fi
          echo "$out"
          {
            echo "## Upstream map audit"
            echo ""
            echo '```'
            echo "$out"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"
